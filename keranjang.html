<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactile Studio - Keranjang</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#fdfaf5; --dark:#1a1a1a; --accent:#d4a373; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans', sans-serif;}
body{background:var(--bg); color: var(--dark);}

/* HEADER */
header{
  padding:1.5rem 8%;
  background:rgba(253, 250, 245, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
}
nav{display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Space Grotesk';font-weight:800;font-size:1.8rem;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center;}
.nav-links a{text-decoration:none;color:var(--dark);font-weight:600;font-size: 1.05rem;position: relative;transition: color 0.3s ease;}
.nav-links a:hover {color: var(--accent);}
.nav-links a::after {content: '';position: absolute;width: 0;height: 2px;bottom: -4px;left: 0;background-color: var(--accent);transition: width 0.3s ease;}
.nav-links a:hover::after {width: 100%;}
.cart-container {display: flex;align-items: center;}
.cart-btn {display: flex;align-items: center;gap: 0.5rem;text-decoration: none;color: white;background: var(--dark);padding: 0.6rem 1.2rem;border-radius: 50px;font-weight: 600;transition: all 0.3s ease;}
.cart-btn:hover {background: var(--accent);transform: translateY(-2px);box-shadow: 0 5px 15px rgba(212, 163, 115, 0.4);}
.cart-badge {background: var(--accent);color: white;width: 20px;height: 20px;border-radius: 50%;display: flex;align-items: center;justify-content: center;font-size: 0.75rem;font-weight: 800;margin-left: 4px;}

/* CART SECTION */
.cart-page { padding: 4rem 8%; min-height: 70vh; }
.cart-page h2 { font-family: 'Space Grotesk'; font-size: 2.5rem; margin-bottom: 2rem; }

.cart-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 3rem;
}

.cart-items {
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
}

.cart-item {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding-bottom: 1.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid #eee;
}
.cart-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.cart-item-img {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    object-fit: cover;
    background: #f5f5f5;
}
.cart-item-details { flex: 1; }
.cart-item-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 0.5rem; }
.cart-item-price { color: var(--accent); font-weight: 600; }
.btn-remove {
    background: #fff0f0; color: #e74c3c; border: none; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
    transition: 0.2s; margin-top: 10px;
}
.btn-remove:hover { background: #e74c3c; color: white; }

.cart-summary {
    background: var(--dark);
    color: white;
    padding: 2rem;
    border-radius: 24px;
    height: fit-content;
    position: sticky;
    top: 100px;
}
.cart-summary h3 { font-family: 'Space Grotesk'; font-size: 1.5rem; margin-bottom: 1.5rem; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #aaa; }
.summary-total { display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); font-weight: 800; font-size: 1.2rem; color: white; }

.btn-checkout {
    width: 100%; padding: 16px; background: var(--accent); color: white;
    border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600;
    cursor: pointer; transition: 0.3s; margin-top: 1.5rem;
}
.btn-checkout:hover { background: white; color: var(--dark); }

.empty-cart { text-align: center; padding: 3rem; color: #777; }
.empty-cart h3 { font-family: 'Space Grotesk'; font-size: 1.5rem; margin-bottom: 1rem; color: var(--dark); }

/* FOOTER */
footer { background: var(--bg); color: white; padding: 4rem 8% 2rem; margin-top: 5rem;}
.footer-bottom { text-align: center; padding-top: 2rem; border-top: 1px solid rgb(183, 174, 137);; color: #777; font-size: 0.95rem; }

@media (max-width: 768px) {
    .cart-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
    <nav>
        <div class="logo">TACTILE<span>.</span></div>
        <ul class="nav-links">
            <li><a href="Home.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="costume.html">Custome</a></li>
            <li><a href="desain.html">Desain</a></li>
        </ul>
        <div class="cart-container">
            <a href="keranjang.html" class="cart-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                Keranjang
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
        </div>
    </nav>
</header>

<section class="cart-page">
    <h2>Keranjang Belanja</h2>
    
    <div class="cart-grid">
        <div class="cart-items" id="cartItemsContainer">
            <!-- Items diisi via JS -->
        </div>

        <div class="cart-summary">
            <h3>Ringkasan Pesanan</h3>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotalPrice">Rp 0</span>
            </div>
            <div class="summary-row">
                <span>Pengiriman</span>
                <span>Gratis</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="totalPrice">Rp 0</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Pesan Sekarang</button>
        </div>
    </div>
</section>

<footer>
    <div class="footer-bottom">
        <p>2026 Tactile Studio. All rights reserved.</p>
    </div>
</footer>

<script>
    // Cek Login
    if (!localStorage.getItem('tactileUser')) {
        window.location.href = 'login.html?redirect=keranjang.html';
    }

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka).replace('Rp', 'Rp ');
    }

    function loadCart() {
        const cartItemsContainer = document.getElementById('cartItemsContainer');
        const subtotalEl = document.getElementById('subtotalPrice');
        const totalEl = document.getElementById('totalPrice');
        const badge = document.getElementById('cartBadge');
        
        let cart = JSON.parse(localStorage.getItem('tactileCart')) || [];
        
        badge.innerText = cart.length;

        if (cart.length === 0) {
            cartItemsContainer.innerHTML = `
                <div class="empty-cart">
                    <h3>Keranjang Anda Kosong</h3>
                    <p>Silakan lihat produk kami dan mulai berbelanja.</p>
                    <br>
                    <a href="shop.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">Lihat Produk</a>
                </div>
            `;
            subtotalEl.innerText = 'Rp 0';
            totalEl.innerText = 'Rp 0';
            return;
        }

        let html = '';
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            html += `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.title}" class="cart-item-img">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.title}</div>
                        <div class="cart-item-price">${formatRupiah(item.price)}</div>
                        <button class="btn-remove" onclick="removeItem(${index})">Hapus</button>
                    </div>
                </div>
            `;
        });

        cartItemsContainer.innerHTML = html;
        subtotalEl.innerText = formatRupiah(total);
        totalEl.innerText = formatRupiah(total);
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('tactileCart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('tactileCart', JSON.stringify(cart));
        loadCart();
    }

    function checkout() {
        let cart = JSON.parse(localStorage.getItem('tactileCart')) || [];
        if(cart.length === 0) {
            alert("Keranjang masih kosong!");
            return;
        }
        
        // Simulasi Pesan Berhasil
        alert("Pesanan berhasil dibuat! Terima kasih telah berbelanja di Tactile Studio.");
        localStorage.removeItem('tactileCart');
        loadCart();
    }

    window.onload = loadCart;
</script>

</body>
</html>
