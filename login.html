<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactile Studio - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#fdfaf5; --dark:#1a1a1a; --accent:#d4a373; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans', sans-serif;}
body{background:var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh;}

.login-container {
    background: white;
    padding: 3rem;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.logo{font-family:'Space Grotesk';font-weight:800;font-size:2rem;letter-spacing:-0.5px; margin-bottom: 2rem;}
.logo span{color:var(--accent);}

.input-group {
    margin-bottom: 1.5rem;
    text-align: left;
}
.input-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: #555;
    font-size: 0.95rem;
}
.input-group input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #eee;
    border-radius: 12px;
    font-size: 1rem;
    transition: border-color 0.3s;
    font-family: 'Plus Jakarta Sans', sans-serif;
}
.input-group input:focus {
    border-color: var(--accent);
    outline: none;
}

.btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 1rem;
}
.btn-primary:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(212, 163, 115, 0.3);
}

.back-link {
    display: inline-block;
    margin-top: 1.5rem;
    color: #888;
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.3s;
}
.back-link:hover {
    color: var(--dark);
}
</style>
</head>
<body>

<div class="login-container">
    <div class="logo">TACTILE<span>.</span></div>
    <p style="margin-bottom: 2rem; color: #666;">Masuk untuk memesan produk dan menggunakan fitur Custom Builder.</p>

    <form id="loginForm">
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="email@contoh.com">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary">Masuk</button>
    </form>

    <a href="index.html" class="back-link">← Kembali ke Beranda</a>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Simulasi proses login berhasil
        localStorage.setItem('tactileUser', 'logged_in');
        
        // Redirect ke halaman sebelumnya (jika ada param 'redirect') atau ke Home
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || 'index.html';
        
        window.location.href = redirect;
    });
</script>

</body>
</html>
