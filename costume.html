<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactile Studio - Custom Keyboard</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@600;800&display=swap" rel="stylesheet">

<style>
:root { --bg:#fdfaf5; --dark:#1a1a1a; --accent:#d4a373; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans', sans-serif;}
body{background:var(--bg); color: var(--dark);}

/* HEADER */
header{
  padding:1.5rem 8%;
  background:rgba(253, 250, 245, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
}
nav{display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Space Grotesk';font-weight:800;font-size:1.8rem;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center;}
.nav-links a{text-decoration:none;color:var(--dark);font-weight:600;font-size: 1.05rem;position: relative;transition: color 0.3s ease;}
.nav-links a:hover {color: var(--accent);}
.nav-links a::after {content: '';position: absolute;width: 0;height: 2px;bottom: -4px;left: 0;background-color: var(--accent);transition: width 0.3s ease;}
.nav-links a:hover::after {width: 100%;}
.cart-container {display: flex;align-items: center;}
.cart-btn {display: flex;align-items: center;gap: 0.5rem;text-decoration: none;color: white;background: var(--dark);padding: 0.6rem 1.2rem;border-radius: 50px;font-weight: 600;transition: all 0.3s ease;}
.cart-btn:hover {background: var(--accent);transform: translateY(-2px);box-shadow: 0 5px 15px rgba(212, 163, 115, 0.4);}
.cart-badge {background: var(--accent);color: white;width: 20px;height: 20px;border-radius: 50%;display: flex;align-items: center;justify-content: center;font-size: 0.75rem;font-weight: 800;margin-left: 4px;}

/* CUSTOM BUILDER SECTION */
#custom{
  padding:80px 8%;
  text-align:center;
}
#custom h2{font-family:'Space Grotesk';font-size:2.8rem;margin-bottom:10px;}
#custom p.subtitle { color: #666; margin-bottom: 50px; font-size: 1.1rem; }

.builder-container {
  display: flex;
  gap: 4rem;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
}

.keyboard-frame{
  padding:20px;border-radius:30px;background:#111;
  display:inline-block;box-shadow:0 30px 60px rgba(0,0,0,0.2);
  transition: background 0.3s;
}

.keyboard{
  display:flex; flex-direction: column; gap:6px;
  background:#222;padding:20px;border-radius:22px;
}
.row { display: flex; gap: 6px; }

.key{
  height:45px; width:45px; background:#444;border-radius:8px;
  cursor:pointer;position:relative;transition:0.2s;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  user-select: none;
}
.key.k-1_25 { width: 58px; }
.key.k-1_5 { width: 71px; }
.key.k-1_75 { width: 83px; }
.key.k-2 { width: 96px; }
.key.k-2_25 { width: 109px; }
.key.k-2_75 { width: 134px; }
.key.k-6_25 { width: 313px; }

.key .legend {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.6);
  pointer-events: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.key .sticker-container {
  font-size: 20px;
  pointer-events: none;
}

.key:hover{transform:translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.3); z-index: 2;}

.controls-panel {
  background: white;
  padding: 35px;
  border-radius: 24px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  text-align: left;
  min-width: 350px;
}
.controls-panel h3 { font-family: 'Space Grotesk'; margin-bottom: 25px; font-size:1.8rem;}
.control-group { margin-bottom: 25px; }
.control-group label { display: block; font-weight: 600; margin-bottom: 10px; font-size:1rem; color: #333;}
input[type="color"]{
  width:100%; height:50px; border:none; border-radius:12px; cursor:pointer;
  padding: 0; background: none;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 12px; }

.stickers{display:flex;gap:12px; flex-wrap:wrap;}
.sticker{
  font-size:24px;cursor:pointer;transition:0.2s;
  width: 50px; height: 50px; background: #f5f5f5; border-radius: 12px;
  display:flex; align-items:center; justify-content:center;
  user-select: none;
}
.sticker:hover, .sticker.active{transform:scale(1.1); background:var(--accent); color:white;}

button{
  width: 100%; margin-top:10px; padding:16px; border:none; border-radius:12px;
  background:var(--dark); color:white; cursor:pointer; font-weight:600; font-size:1.1rem;
  transition:0.3s;
}
button:hover{background:var(--accent); transform:translateY(-3px); box-shadow: 0 10px 20px rgba(212, 163, 115, 0.4);}
button.btn-outline { background: transparent; border: 2px solid var(--dark); color: var(--dark); margin-bottom: 10px; }
button.btn-outline:hover { background: var(--dark); color: white; }
button.btn-outline.active { background: #e74c3c; border-color: #e74c3c; color: white; }

/* Design Name Input */
.design-name-input {
  width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px;
  font-size: 1rem; margin-bottom: 25px; outline: none; font-family: 'Plus Jakarta Sans';
  transition: border-color 0.3s;
}
.design-name-input:focus { border-color: var(--accent); }

/* FOOTER */
footer { background: var(--bg); color: rgb(183, 174, 137); padding: 4rem 8% 2rem; margin-top: 5rem;}
.footer-bottom { text-align: center; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.1); color: #777; font-size: 0.95rem; }

/* MOBILE RESPONSIVE SCALING */
@media (max-width: 768px) {
  .builder-container { flex-direction: column; align-items: center; }
  .keyboard-frame {
    transform: scale(0.6);
    transform-origin: top left;
    margin-bottom: -150px; /* Kompensasi scaling */
  }
  #custom { overflow-x: auto; padding-bottom: 0; }
  .controls-panel { width: 100%; min-width: unset; }
}
@media (max-width: 480px) {
  .keyboard-frame {
    transform: scale(0.45);
    margin-bottom: -200px;
  }
}
</style>
</head>
<body>

<header>
    <nav>
        <div class="logo">TACTILE<span>.</span></div>
        <ul class="nav-links">
            <li><a href="Home.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="costume.html">Custome</a></li>
            <li><a href="desain.html">Desain</a></li>
        </ul>
        <div class="cart-container">
            <a href="keranjang.html" class="cart-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                Keranjang
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
        </div>
    </nav>
</header>

<section id="custom">
    <h2>Custom Keyboard Builder</h2>
    <p class="subtitle">Desain keyboard impian Anda secara detail dan simpan ke koleksi karya Anda.</p>

    <div class="builder-container">
        <!-- Frame & Keys -->
        <div class="keyboard-frame" id="frame">
            <div class="keyboard" id="keyboard"></div>
        </div>

        <!-- Controls -->
        <div class="controls-panel">
            <h3>Alat Desain</h3>
            
            <input type="text" id="designName" class="design-name-input" placeholder="Nama Desain (mis: Red Dragon)">

            <div class="control-group">
                <label>Warna Casing (Frame):</label>
                <input type="color" id="framePicker" value="#111111">
            </div>

            <div class="control-group">
                <label>Warna Tombol (Keycaps):</label>
                <input type="color" id="keyPicker" value="#444444">
            </div>

            <div class="control-group">
                <label>Stiker (Aksesoris):</label>
                <div class="stickers">
                    <div class="sticker" onclick="setSticker('⭐', this)">⭐</div>
                    <div class="sticker" onclick="setSticker('❤️', this)">❤️</div>
                    <div class="sticker" onclick="setSticker('🌸', this)">🌸</div>
                    <div class="sticker" onclick="setSticker('🔥', this)">🔥</div>
                    <div class="sticker" onclick="setSticker('🐱', this)">🐱</div>
                    <div class="sticker" onclick="setSticker('💀', this)">💀</div>
                    <div class="sticker" onclick="setSticker('💎', this)">💎</div>
                    <div class="sticker" onclick="setSticker('⚡', this)">⚡</div>
                </div>
            </div>

            <button onclick="toggleEraser()" id="eraserBtn" class="btn-outline">🧽 Mode Penghapus Tombol</button>
            <button onclick="saveDesign()">💾 Simpan Desain</button>
        </div>
    </div>
</section>

<footer>
    <div class="footer-bottom">
        <p>2026 Tactile Studio. All rights reserved.</p>
    </div>
</footer>

<script>
    // UPDATE CART BADGE
    function updateCartBadge() {
        let cart = JSON.parse(localStorage.getItem('tactileCart')) || [];
        const badge = document.getElementById('cartBadge');
        if(badge) badge.innerText = cart.length;
    }
    updateCartBadge();

    const keyboard = document.getElementById('keyboard');
    const frame = document.getElementById('frame');
    
    let keyColor = '#444444';
    let frameColor = '#111111';
    let selectedSticker = '';
    let isEraser = false;

    // Array to store key states
    const keysData = [];

    const layout = [
        [{s:'1', l:'Esc'}, {s:'1', l:'1!'}, {s:'1', l:'2@'}, {s:'1', l:'3#'}, {s:'1', l:'4$'}, {s:'1', l:'5%'}, {s:'1', l:'6^'}, {s:'1', l:'7&'}, {s:'1', l:'8*'}, {s:'1', l:'9('}, {s:'1', l:'0)'}, {s:'1', l:'-_'}, {s:'1', l:'=+'}, {s:'2', l:'Bksp'}],
        [{s:'1.5', l:'Tab'}, {s:'1', l:'Q'}, {s:'1', l:'W'}, {s:'1', l:'E'}, {s:'1', l:'R'}, {s:'1', l:'T'}, {s:'1', l:'Y'}, {s:'1', l:'U'}, {s:'1', l:'I'}, {s:'1', l:'O'}, {s:'1', l:'P'}, {s:'1', l:'[{'}, {s:'1', l:']}'}, {s:'1.5', l:'\\|'}],
        [{s:'1.75', l:'Caps'}, {s:'1', l:'A'}, {s:'1', l:'S'}, {s:'1', l:'D'}, {s:'1', l:'F'}, {s:'1', l:'G'}, {s:'1', l:'H'}, {s:'1', l:'J'}, {s:'1', l:'K'}, {s:'1', l:'L'}, {s:'1', l:';:'}, {s:'1', l:'\''}, {s:'2.25', l:'Enter'}],
        [{s:'2.25', l:'Shift'}, {s:'1', l:'Z'}, {s:'1', l:'X'}, {s:'1', l:'C'}, {s:'1', l:'V'}, {s:'1', l:'B'}, {s:'1', l:'N'}, {s:'1', l:'M'}, {s:'1', l:',<'}, {s:'1', l:'.>'}, {s:'1', l:'/?'}, {s:'2.75', l:'Shift'}],
        [{s:'1.25', l:'Ctrl'}, {s:'1.25', l:'Win'}, {s:'1.25', l:'Alt'}, {s:'6.25', l:''}, {s:'1.25', l:'Alt'}, {s:'1.25', l:'Win'}, {s:'1.25', l:'Menu'}, {s:'1.25', l:'Ctrl'}]
    ];

    let keyIndex = 0;

    layout.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.classList.add('row');
        
        row.forEach(keyObj => {
            const size = keyObj.s;
            const label = keyObj.l;
            const key = document.createElement('div');
            key.classList.add('key');
            if (size !== '1') key.classList.add('k-' + size.replace('.', '_'));
            
            // Initial state
            keysData.push({ color: '#444444', sticker: '', label: label });
            const currentIndex = keyIndex;

            key.innerHTML = `<span class="legend">${label}</span><span class="sticker-container"></span>`;

            // Apply style on click
            key.addEventListener('click', () => {
                const stickerCont = key.querySelector('.sticker-container');
                if(isEraser){
                    key.style.background = '#444444';
                    stickerCont.innerHTML = '';
                    keysData[currentIndex] = { color: '#444444', sticker: '', label: label };
                    return;
                }

                key.style.background = keyColor;
                keysData[currentIndex].color = keyColor;

                if(selectedSticker){
                    stickerCont.innerHTML = selectedSticker;
                    keysData[currentIndex].sticker = selectedSticker;
                }
            });

            rowDiv.appendChild(key);
            keyIndex++;
        });
        
        keyboard.appendChild(rowDiv);
    });

    document.getElementById('framePicker').oninput = e => {
        frameColor = e.target.value;
        frame.style.background = frameColor;
    };

    document.getElementById('keyPicker').oninput = e => {
        keyColor = e.target.value;
        // Turn off eraser if active
        if(isEraser) toggleEraser();
        clearStickerSelection();
    };

    function setSticker(emoji, element){
        selectedSticker = emoji;
        if(isEraser) toggleEraser();
        
        document.querySelectorAll('.sticker').forEach(s => s.classList.remove('active'));
        if(element) element.classList.add('active');
    }

    function clearStickerSelection() {
        selectedSticker = '';
        document.querySelectorAll('.sticker').forEach(s => s.classList.remove('active'));
    }

    function toggleEraser(){
        isEraser = !isEraser;
        document.getElementById("eraserBtn").classList.toggle("active");
        if(isEraser) {
            clearStickerSelection();
        }
    }

    function saveDesign(){
        if (!localStorage.getItem('tactileUser')) {
            alert('Anda harus login terlebih dahulu untuk menyimpan desain!');
            window.location.href = 'login.html?redirect=costume.html';
            return;
        }

        const nameInput = document.getElementById('designName').value.trim();
        if(!nameInput) {
            alert('Silakan masukkan Nama Desain terlebih dahulu!');
            document.getElementById('designName').focus();
            return;
        }

        let calculatedPrice = 1500000;
        keysData.forEach(k => {
            if (k.color !== '#444444') {
                calculatedPrice += 15000;
            }
            if (k.sticker !== '') {
                calculatedPrice += 50000;
            }
        });

        const design = {
            id: Date.now(),
            name: nameInput,
            frameColor: frameColor,
            keys: keysData,
            price: calculatedPrice
        };

        // Save to LocalStorage
        let savedDesigns = JSON.parse(localStorage.getItem('tactileDesigns')) || [];
        savedDesigns.push(design);
        localStorage.setItem('tactileDesigns', JSON.stringify(savedDesigns));

        // Alert user
        alert('Desain "' + nameInput + '" berhasil disimpan dengan total harga Rp ' + calculatedPrice.toLocaleString('id-ID') + '!');
        
        // Redirect to desain.html
        window.location.href = 'desain.html';
    }
</script>

</body>
</html>
